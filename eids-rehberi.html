700;font-size:13px;display:flex;align-items:center;justify-content:center;\">3<\/div>\n          <div style=\"flex:1 1 auto;\">\n            <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:17px;color:#12293E;\">Paylaşımı nasıl yapacaksın?<\/div>\n            <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;\">\n              <button onclick=\"{{ answer }}\" data-q=\"3\" data-val=\"link\" style=\"flex:1 1 220px;text-align:left;border:1.5px solid #E2DCcf;background:#FBFAF7;border-radius:12px;padding:14px 16px;cursor:pointer;\" style-hover=\"border-color:#12293E;\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;gap:8px;\">\n                  <span style=\"font-weight:600;font-size:14.5px;color:#26333e;\">Portaldaki doğrulanmış ilanın linkini<\/span>\n                  <sc-if value=\"{{ selQ3link }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#12293E;font-weight:800;\">●<\/span><\/sc-if>\n                <\/div>\n              <\/button>\n              <button onclick=\"{{ answer }}\" data-q=\"3\" data-val=\"direkt\" style=\"flex:1 1 220px;text-align:left;border:1.5px solid #E2DCcf;background:#FBFAF7;border-radius:12px;padding:14px 16px;cursor:pointer;\" style-hover=\"border-color:#12293E;\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;gap:8px;\">\n                  <span style=\"font-weight:600;font-size:14.5px;color:#26333e;\">Doğrudan fiyat + görsel + konumlu post/Reels<\/span>\n                  <sc-if value=\"{{ selQ3direkt }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#12293E;font-weight:800;\">●<\/span><\/sc-if>\n                <\/div>\n              <\/button>\n            <\/div>\n          <\/div>\n        <\/div>\n        <\/sc-if>\n\n        <!-- VERDICT -->\n        <div id=\"arac-verdict\">\n        <sc-if value=\"{{ showVerdict }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:24px;border:1.5px solid {{ vBorder }};background:{{ vBg }};border-radius:14px;padding:20px 22px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;\">\n            <div style=\"width:34px;height:34px;border-radius:50%;background:{{ vAccent }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex:0 0 auto;\">{{ vIcon }}<\/div>\n            <div>\n              <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;color:{{ vAccent }};\">{{ vLabel }}<\/div>\n              <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:18px;color:#12293E;margin-top:1px;\">{{ vTitle }}<\/div>\n            <\/div>\n          <\/div>\n          <p style=\"margin:12px 0 0;font-size:14.5px;line-height:1.6;color:#3a4855;\">{{ vBody }}<\/p>\n        <\/div>\n        <\/sc-if>\n        <\/div>\n\n        <sc-if value=\"{{ hasAnswer }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:16px;\">\n          <button onclick=\"{{ resetTool }}\" style=\"border:1px solid #E2DCcf;background:#fff;color:#5C6773;font-family:Arial,Helvetica,sans-serif;font-weight:600;font-size:13px;padding:8px 14px;border-radius:999px;cursor:pointer;\" style-hover=\"border-color:#12293E;color:#12293E;\">↺ Baştan başla<\/button>\n        <\/div>\n        <\/sc-if>\n\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- İZİN / YASAK -->\n  <section id=\"kurallar\" style=\"max-width:1120px;margin:0 auto;padding:60px 24px;\">\n    <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#D6122B;\">Net Kurallar<\/div>\n    <h2 style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:32px;color:#12293E;margin:10px 0 30px;letter-spacing:-.01em;\">Ne paylaşılabilir, ne yasak<\/h2>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;\">\n      <!-- İZİN -->\n      <div style=\"background:#fff;border:1px solid #BFE0CC;border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(18,41,62,.04);\">\n        <div style=\"background:#EAF4EE;padding:16px 22px;border-bottom:1px solid #BFE0CC;display:flex;align-items:center;gap:10px;\">\n          <span style=\"width:26px;height:26px;border-radius:50%;background:#147A4B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;\">✓<\/span>\n          <span style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:16px;color:#0f5e39;letter-spacing:.02em;\">İZİN VERİLENLER<\/span>\n        <\/div>\n        <ul style=\"list-style:none;margin:0;padding:8px 22px 20px;\">\n          <li style=\"padding:12px 0;border-bottom:1px solid #F0EEE7;font-size:14.5px;line-height:1.55;color:#33414D;\">EİDS doğrulaması yapılmış (portalda yayımlanan) bir ilanın <strong>linkinin<\/strong> paylaşılması.<\/li>\n          <li style=\"padding:12px 0;border-bottom:1px solid #F0EEE7;font-size:14.5px;line-height:1.55;color:#33414D;\">Marka / ofis tanıtımı, bölge analizleri, yatırım değerlendirmeleri.<\/li>\n          <li style=\"padding:12px 0;border-bottom:1px solid #F0EEE7;font-size:14.5px;line-height:1.55;color:#33414D;\">Sektörel bilgilendirme içerikleri, ofis içi çalışmalar.<\/li>\n          <li style=\"padding:12px 0;font-size:14.5px;line-height:1.55;color:#33414D;\">Başarı hikâyeleri (belirli daire ilanı olmadan).<\/li>\n        <\/ul>\n      <\/div>\n      <!-- YASAK -->\n      <div style=\"background:#fff;border:1px solid #F0C4CA;border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(18,41,62,.04);\">\n        <div style=\"background:#FBEDEE;padding:16px 22px;border-bottom:1px solid #F0C4CA;display:flex;align-items:center;gap:10px;\">\n          <span style=\"width:26px;height:26px;border-radius:50%;background:#D6122B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;\">✕<\/span>\n          <span style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:16px;color:#A50E20;letter-spacing:.02em;\">YASAK / RİSKLİ<\/span>\n        <\/div>\n        <ul style=\"list-style:none;margin:0;padding:8px 22px 20px;\">\n          <li style=\"padding:12px 0;border-bottom:1px solid #F0EEE7;font-size:14.5px;line-height:1.55;color:#33414D;\">Doğrulanmamış, doğrudan “ilan mahiyetli” görsel / video / fiyat / konum paylaşımı.<\/li>\n          <li style=\"padding:12px 0;border-bottom:1px solid #F0EEE7;font-size:14.5px;line-height:1.55;color:#33414D;\">Yetkilendirilmediğin (e-Devlet'ten yetki almadığın) bir taşınmaza dair paylaşım.<\/li>\n          <li style=\"padding:12px 0;border-bottom:1px solid #F0EEE7;font-size:14.5px;line-height:1.55;color:#33414D;\">Yetki belgesi olmayan kişilerce yapılan her türlü ilan paylaşımı.<\/li>\n          <li style=\"padding:12px 0;font-size:14.5px;line-height:1.55;color:#33414D;\">WhatsApp/Telegram gruplarında doğrulanmamış portföy dolaştırmak.<\/li>\n        <\/ul>\n      <\/div>\n    <\/div>\n    <p style=\"margin:18px 0 0;font-size:13px;color:#8a7f6d;line-height:1.55;background:#FBF2DF;border:1px solid #EAD9AE;border-radius:10px;padding:12px 16px;\"><strong style=\"color:#9A6B12;\">Not:<\/strong> “İlan” ile “bilgilendirme içeriği” arasındaki sınır hâlâ resmi olarak netleştirilmemiştir; bu belirsizlik sektörün başlıca şikâyet konusudur. Şüphede kalırsan içeriği çizginin güvenli tarafına kur.<\/p>\n  <\/section>\n\n  <!-- CEZALAR -->\n  <section id=\"cezalar\" style=\"background:#fff;border-top:1px solid #E7E2D6;border-bottom:1px solid #E7E2D6;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:60px 24px;\">\n      <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#D6122B;\">Yaptırımlar<\/div>\n      <h2 style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:32px;color:#12293E;margin:10px 0 6px;letter-spacing:-.01em;\">Cezalar ve riskler<\/h2>\n      <p style=\"color:#5C6773;font-size:15px;line-height:1.6;max-width:62ch;margin:0 0 30px;\">En somut ve kesin risk idari para cezası ve hesap erişim engelidir. Yetki belgesi iptali de gündemdedir.<\/p>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;\">\n        <div style=\"border:1px solid #F0C4CA;background:#FBEDEE;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#A50E20;\">İdari para cezası<\/div>\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:23px;color:#12293E;margin:8px 0 2px;\">28.620 – 286.206 ₺<\/div>\n          <p style=\"margin:6px 0 0;font-size:13px;line-height:1.55;color:#5c4a4c;\">Her bir aykırılık için (6563 sayılı Kanun md. 12). Üst sınır 2026 için %25,49 yeniden değerlemeyle belirlendi.<\/p>\n        <\/div>\n        <div style=\"border:1px solid #E7E2D6;background:#FBFAF7;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#5C6773;\">Erişim engeli<\/div>\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:23px;color:#12293E;margin:8px 0 2px;\">1.426 hesap<\/div>\n          <p style=\"margin:6px 0 0;font-size:13px;line-height:1.55;color:#5C6773;\">Aykırı ilan paylaşan sosyal medya hesaplarına erişim engeli (26 Ara. 2024 kümülatif).<\/p>\n        <\/div>\n        <div style=\"border:1px solid #E7E2D6;background:#FBFAF7;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#5C6773;\">Yetki belgesi iptali<\/div>\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:23px;color:#12293E;margin:8px 0 2px;\">Tekrarlanan ihlal<\/div>\n          <p style=\"margin:6px 0 0;font-size:13px;line-height:1.55;color:#5C6773;\">Giderilmeyen aykırılıklarda yetki belgesinin iptali gündemde (“yasal çalışma başlatıldı”, Ara. 2024).<\/p>\n        <\/div>\n        <div style=\"border:1px solid #E7E2D6;background:#FBFAF7;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#5C6773;\">Platforma ceza<\/div>\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:23px;color:#12293E;margin:8px 0 2px;\">5.000.000 ₺<\/div>\n          <p style=\"margin:6px 0 0;font-size:13px;line-height:1.55;color:#5C6773;\">Meta Platforms'a Instagram/Facebook/WhatsApp'taki aykırı ilanlar için toplam ceza (13 Haz. 2026).<\/p>\n        <\/div>\n      <\/div>\n      <p style=\"margin:18px 0 0;font-size:13.5px;color:#5C6773;line-height:1.55;\">Daha geniş tablo: Bakanlık, taşınmaz ilanlarıyla haksız fiyat artışlarına aracılık eden <strong style=\"color:#12293E;\">1.423 emlak işletmesine toplam 173,3 milyon ₺<\/strong> idari para cezası kestiğini açıkladı.<\/p>\n    <\/div>\n  <\/section>\n\n  <!-- EİDS YETKİ -->\n  <section id=\"eids\" style=\"max-width:1120px;margin:0 auto;padding:60px 24px;\">\n    <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#1F4E79;\">e-Devlet Süreci<\/div>\n    <h2 style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:32px;color:#12293E;margin:10px 0 6px;letter-spacing:-.01em;\">Belirli bir daireyi paylaşmanın tek güvenli yolu<\/h2>\n    <p style=\"color:#5C6773;font-size:15px;line-height:1.6;max-width:62ch;margin:0 0 30px;\">Bir taşınmazı sosyal medyada göstermek istiyorsan sıra şu: önce yetki, sonra portal, en son link.<\/p>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;\">\n      <div style=\"background:#fff;border:1px solid #E7E2D6;border-radius:16px;padding:24px;box-shadow:0 1px 2px rgba(18,41,62,.04);position:relative;\">\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:40px;color:#EAD9AE;line-height:1;\">01<\/div>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:17px;color:#12293E;margin:8px 0 8px;\">Mülkü EİDS'de doğrula<\/div>\n        <p style=\"margin:0;font-size:14px;line-height:1.6;color:#4a5762;\">Mal sahibi e-Devlet'teki <em>“EİDS Taşınmaz İlanı Yetkilendirme İşlemleri”<\/em> ekranından (Web Tapu bağlantılı), taşınmazı ve ofisinin <strong>7 haneli yetki belgesi numarasını<\/strong> seçerek yetki verir. Ücretsizdir, süre asgari 3 aydır.<\/p>\n      <\/div>\n      <div style=\"background:#fff;border:1px solid #E7E2D6;border-radius:16px;padding:24px;box-shadow:0 1px 2px rgba(18,41,62,.04);\">\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:40px;color:#EAD9AE;line-height:1;\">02<\/div>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:17px;color:#12293E;margin:8px 0 8px;\">Portalda doğrulanmış ilanı yayınla<\/div>\n        <p style=\"margin:0;font-size:14px;line-height:1.6;color:#4a5762;\">İlan sitesinde <strong>EİDS logolu<\/strong> ilanı yayına al. Daire turu videosu, tüm görseller ve fiyat orada dursun. Sistem malik/yetki kontrolünü otomatik yapar.<\/p>\n      <\/div>\n      <div style=\"background:#12293E;border:1px solid #12293E;border-radius:16px;padding:24px;box-shadow:0 1px 2px rgba(18,41,62,.04);\">\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:40px;color:#3d5871;line-height:1;\">03<\/div>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:17px;color:#fff;margin:8px 0 8px;\">Sosyal medyada linki paylaş<\/div>\n        <p style=\"margin:0;font-size:14px;line-height:1.6;color:#b9c6d3;\">Story'de link sticker, bio'da link. Kısa teaser + “detaylar ve tüm görseller ilanımızda → link”. Fiyatı/adresi postun içine gömmeden linke yönlendir.<\/p>\n      <\/div>\n    <\/div>\n\n    <div style=\"margin-top:20px;background:#EAF0F6;border:1px solid #BFD3E6;border-radius:12px;padding:16px 20px;font-size:13.5px;line-height:1.6;color:#294256;\">\n      <strong>Unutma:<\/strong> EİDS yetkisi; yetkilendirme sözleşmesi, taşınmaz gösterme belgesi ve aracılık sözleşmesi gibi belgelerin yerine <strong>geçmez<\/strong>. Bu belgeleri düzenleme zorunluluğu devam eder. Bireysel ilanlar yalnızca malik, eşi veya 1./2. derece kan hısımları tarafından verilebilir.\n    <\/div>\n  <\/section>\n\n  <!-- İÇERİK STRATEJİSİ -->\n  <section id=\"strateji\" style=\"background:#fff;border-top:1px solid #E7E2D6;border-bottom:1px solid #E7E2D6;\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:60px 24px;\">\n      <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#147A4B;\">Güvenli İçerik<\/div>\n      <h2 style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:32px;color:#12293E;margin:10px 0 6px;letter-spacing:-.01em;\">Sosyal medyada ne çekmeli?<\/h2>\n      <p style=\"color:#5C6773;font-size:15px;line-height:1.6;max-width:64ch;margin:0 0 30px;\">Videoyu çizginin güvenli tarafına kur: markayı, bölgeyi, bilgiyi ve süreci anlatan içerikler “ilan” değildir ve serbesttir.<\/p>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;\">\n        <div style=\"border:1px solid #BFE0CC;background:#EAF4EE;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:14px;color:#0f5e39;\">A · Bölge otoritesi videoları<\/div>\n          <p style=\"margin:8px 0 0;font-size:13.5px;line-height:1.6;color:#33414D;\">En güçlü ve en güvenli koz — özellikle Fikirtepe gibi dönüşüm bölgeleri. “Hangi etap teslim oldu?”, “manzara/kat/cephe farkı fiyatı nasıl etkiler?” Belirli daire satışa çıkarmadan, fiyat vermeden anlatım + drone/yürüyüş çekimi.<\/p>\n        <\/div>\n        <div style=\"border:1px solid #BFE0CC;background:#EAF4EE;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:14px;color:#0f5e39;\">B · Eğitici / danışmanlık<\/div>\n          <p style=\"margin:8px 0 0;font-size:13.5px;line-height:1.6;color:#33414D;\">“Devirli satışta alıcı nelere dikkat etmeli?”, “Kapora dolandırıcılığından korunma”, “EİDS nedir, yetki belgesiz emlakçıdan neden uzak durulmalı?” Hem bilgi verir hem ofisi meşru taraf olarak konumlar.<\/p>\n        <\/div>\n        <div style=\"border:1px solid #BFE0CC;background:#EAF4EE;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:14px;color:#0f5e39;\">C · Marka + insan<\/div>\n          <p style=\"margin:8px 0 0;font-size:13.5px;line-height:1.6;color:#33414D;\">Danışman tanıtımları (“Ben [isim], Fikirtepe uzmanınız”), ofis içi anlar, ekip, “bugün 2 sözleşme yaptık” tarzı başarı anları, izinli müşteri memnuniyeti / teslim videoları.<\/p>\n        <\/div>\n        <div style=\"border:1px solid #BFE0CC;background:#EAF4EE;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:14px;color:#0f5e39;\">D · Süreç &amp; sosyal kanıt<\/div>\n          <p style=\"margin:8px 0 0;font-size:13.5px;line-height:1.6;color:#33414D;\">“Bir evi satışa çıkarırken ofis ne yapıyor?” akışı: değerleme → emsal raporu → ilan → satış. Adres/fiyat vermeden anonim vaka anlatımları.<\/p>\n        <\/div>\n      <\/div>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;\">\n        <div style=\"border:1px solid #F0C4CA;background:#FBEDEE;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:14px;color:#A50E20;\">✕ KESİN YAPMA<\/div>\n          <p style=\"margin:8px 0 0;font-size:13.5px;line-height:1.6;color:#5c4a4c;\">Doğrudan post/Reels olarak “Satılık 3+1, [proje/etap], X milyon ₺, DM'den ulaşın” tarzı, doğrulaması olmayan fiyatlı/konumlu ilan paylaşımı. <strong>Ceza tam olarak buradan gelir.<\/strong><\/p>\n        <\/div>\n        <div style=\"border:1px solid #E7E2D6;background:#FBFAF7;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:14px;color:#12293E;\">Üretim ipuçları<\/div>\n          <p style=\"margin:8px 0 0;font-size:13.5px;line-height:1.6;color:#4a5762;\">15–45 sn dikey Reels/TikTok; ilk 3 sn'de kanca (“Fikirtepe'de tapu dağılmadan daire satılır mı? Evet.”); uyumlu CTA (“Sorularınız için DM” / “İlanlarımız profilde”). Haftalık ritim: 2 bölge/bilgi + 1 marka/insan + doğrulanmış ilan linkleri story'de.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- COMPLIANCE CHECKLIST -->\n  <section style=\"max-width:1120px;margin:0 auto;padding:60px 24px 20px;\">\n    <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#9A6B12;\">Kontrol Listesi<\/div>\n    <h2 style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:32px;color:#12293E;margin:10px 0 6px;letter-spacing:-.01em;\">İlan mahiyetli paylaşımda görünür olmalı<\/h2>\n    <p style=\"color:#5C6773;font-size:15px;line-height:1.6;max-width:60ch;margin:0 0 24px;\">Paylaşmadan önce işaretle. (Yönetmelik md. 12 &amp; 14)<\/p>\n\n    <div style=\"background:#fff;border:1px solid #E7E2D6;border-radius:16px;padding:10px 8px;max-width:760px;box-shadow:0 1px 2px rgba(18,41,62,.04);\">\n      <div onclick=\"{{ toggleCheck }}\" data-chk=\"belge\" style=\"display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;cursor:pointer;\" style-hover=\"background:#FBFAF7;\">\n        <sc-if value=\"{{ cBelge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;background:#147A4B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;\">✓<\/span><\/sc-if>\n        <sc-if value=\"{{ cBelgeOff }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid #D7D0c1;\"><\/span><\/sc-if>\n        <span style=\"font-size:15px;color:#26333e;font-weight:500;\">Yetki belgesi numarası <span style=\"color:#8a939c;\">(7 hane)<\/span><\/span>\n      <\/div>\n      <div onclick=\"{{ toggleCheck }}\" data-chk=\"unvan\" style=\"display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;cursor:pointer;border-top:1px solid #F2F0E9;\" style-hover=\"background:#FBFAF7;\">\n        <sc-if value=\"{{ cUnvan }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;background:#147A4B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;\">✓<\/span><\/sc-if>\n        <sc-if value=\"{{ cUnvanOff }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid #D7D0c1;\"><\/span><\/sc-if>\n        <span style=\"font-size:15px;color:#26333e;font-weight:500;\">İşletme adı / unvanı <span style=\"color:#8a939c;\">(yetki belgesindeki)<\/span><\/span>\n      <\/div>\n      <div onclick=\"{{ toggleCheck }}\" data-chk=\"konum\" style=\"display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;cursor:pointer;border-top:1px solid #F2F0E9;\" style-hover=\"background:#FBFAF7;\">\n        <sc-if value=\"{{ cKonum }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;background:#147A4B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;\">✓<\/span><\/sc-if>\n        <sc-if value=\"{{ cKonumOff }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid #D7D0c1;\"><\/span><\/sc-if>\n        <span style=\"font-size:15px;color:#26333e;font-weight:500;\">İl / ilçe / mahalle <span style=\"color:#8a939c;\">(+ ada / parsel; adres hariç)<\/span><\/span>\n      <\/div>\n      <div onclick=\"{{ toggleCheck }}\" data-chk=\"iletisim\" style=\"display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;cursor:pointer;border-top:1px solid #F2F0E9;\" style-hover=\"background:#FBFAF7;\">\n        <sc-if value=\"{{ cIletisim }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;background:#147A4B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;\">✓<\/span><\/sc-if>\n        <sc-if value=\"{{ cIletisimOff }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid #D7D0c1;\"><\/span><\/sc-if>\n        <span style=\"font-size:15px;color:#26333e;font-weight:500;\">İletişim bilgisi<\/span>\n      <\/div>\n      <div onclick=\"{{ toggleCheck }}\" data-chk=\"enerji\" style=\"display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;cursor:pointer;border-top:1px solid #F2F0E9;\" style-hover=\"background:#FBFAF7;\">\n        <sc-if value=\"{{ cEnerji }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;background:#147A4B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;\">✓<\/span><\/sc-if>\n        <sc-if value=\"{{ cEnerjiOff }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid #D7D0c1;\"><\/span><\/sc-if>\n        <span style=\"font-size:15px;color:#26333e;font-weight:500;\">Enerji kimlik bilgisi <span style=\"color:#8a939c;\">(varsa)<\/span><\/span>\n      <\/div>\n      <div onclick=\"{{ toggleCheck }}\" data-chk=\"link\" style=\"display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;cursor:pointer;border-top:1px solid #F2F0E9;\" style-hover=\"background:#FBFAF7;\">\n        <sc-if value=\"{{ cLink }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;background:#147A4B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;\">✓<\/span><\/sc-if>\n        <sc-if value=\"{{ cLinkOff }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid #D7D0c1;\"><\/span><\/sc-if>\n        <span style=\"font-size:15px;color:#26333e;font-weight:500;\">Doğrulanmış ilan linki <span style=\"color:#8a939c;\">(EİDS logolu portal ilanı)<\/span><\/span>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ZAMAN ÇİZELGESİ -->\n  <section id=\"zaman\" style=\"max-width:1120px;margin:0 auto;padding:40px 24px 60px;\">\n    <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#1F4E79;\">Mevzuat Arka Planı<\/div>\n    <h2 style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:32px;color:#12293E;margin:10px 0 30px;letter-spacing:-.01em;\">Zaman çizelgesi<\/h2>\n\n    <div style=\"position:relative;padding-left:26px;border-left:2px solid #E0DAcc;display:flex;flex-direction:column;gap:22px;\">\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute;left:-33px;top:2px;width:13px;height:13px;border-radius:50%;background:#fff;border:3px solid #B7AE99;\"><\/span>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;color:#8a7f6d;\">5 Haziran 2018<\/div>\n        <div style=\"font-size:14.5px;color:#33414D;line-height:1.5;margin-top:2px;\">Taşınmaz Ticareti Hakkında Yönetmelik yürürlüğe girdi.<\/div>\n      <\/div>\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute;left:-33px;top:2px;width:13px;height:13px;border-radius:50%;background:#fff;border:3px solid #B7AE99;\"><\/span>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;color:#8a7f6d;\">31 Ağustos 2023<\/div>\n        <div style=\"font-size:14.5px;color:#33414D;line-height:1.5;margin-top:2px;\">İnternet ilanlarına kimlik/yetki doğrulama yükümlülüğü eklendi (md. 12, RG 32295).<\/div>\n      <\/div>\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute;left:-33px;top:2px;width:13px;height:13px;border-radius:50%;background:#fff;border:3px solid #B7AE99;\"><\/span>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;color:#8a7f6d;\">1 Kasım 2023<\/div>\n        <div style=\"font-size:14.5px;color:#33414D;line-height:1.5;margin-top:2px;\">Faz 1 — Kimlik doğrulaması (tüm ilan verenler).<\/div>\n      <\/div>\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute;left:-33px;top:2px;width:13px;height:13px;border-radius:50%;background:#fff;border:3px solid #B7AE99;\"><\/span>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;color:#8a7f6d;\">15 Eylül 2024<\/div>\n        <div style=\"font-size:14.5px;color:#33414D;line-height:1.5;margin-top:2px;\">Faz 2 — Yetki doğrulaması devreye alındı (31 Ara. 2024'e kadar geçiş).<\/div>\n      <\/div>\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute;left:-33px;top:2px;width:13px;height:13px;border-radius:50%;background:#FBEDEE;border:3px solid #D6122B;\"><\/span>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;color:#A50E20;\">26 Aralık 2024<\/div>\n        <div style=\"font-size:14.5px;color:#33414D;line-height:1.5;margin-top:2px;\">Sosyal medyada aykırı ilanlara erişim engeli + Meta'ya ceza açıklandı; 1.426 hesap engellendi.<\/div>\n      <\/div>\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute;left:-33px;top:2px;width:13px;height:13px;border-radius:50%;background:#fff;border:3px solid #B7AE99;\"><\/span>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;color:#8a7f6d;\">1 Ocak 2025<\/div>\n        <div style=\"font-size:14.5px;color:#33414D;line-height:1.5;margin-top:2px;\">Kiralık taşınmaz ilanlarında yetki doğrulaması zorunlu.<\/div>\n      <\/div>\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute;left:-33px;top:2px;width:13px;height:13px;border-radius:50%;background:#fff;border:3px solid #B7AE99;\"><\/span>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;color:#8a7f6d;\">7 Nisan 2025<\/div>\n        <div style=\"font-size:14.5px;color:#33414D;line-height:1.5;margin-top:2px;\">Satılık iş yeri ilanlarında yetki doğrulaması zorunlu.<\/div>\n      <\/div>\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute;left:-33px;top:2px;width:15px;height:15px;border-radius:50%;background:#12293E;border:3px solid #12293E;\"><\/span>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;color:#12293E;\">1 Şubat 2026 · FİNAL<\/div>\n        <div style=\"font-size:14.5px;color:#12293E;line-height:1.5;margin-top:2px;font-weight:600;\">Satılık konut dahil tüm satılık taşınmaz ilanlarında yetki doğrulaması zorunlu — kesinleşti ve yürürlükte.<\/div>\n      <\/div>\n      <div style=\"position:relative;\">\n        <span style=\"position:absolute;left:-33px;top:2px;width:13px;height:13px;border-radius:50%;background:#FBEDEE;border:3px solid #D6122B;\"><\/span>\n        <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;color:#A50E20;\">13 Haziran 2026<\/div>\n        <div style=\"font-size:14.5px;color:#33414D;line-height:1.5;margin-top:2px;\">Meta'ya toplam 5 milyon ₺ ceza açıklandı; denetimler kararlılıkla sürüyor.<\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- GEREKÇE / ALINTI -->\n  <section style=\"background:#12293E;\">\n    <div style=\"max-width:900px;margin:0 auto;padding:60px 24px;text-align:center;\">\n      <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#EE8A96;\">Gerekçe<\/div>\n      <blockquote style=\"margin:18px 0 0;font-family:Arial,Helvetica,sans-serif;font-weight:600;font-size:25px;line-height:1.4;color:#fff;letter-spacing:-.01em;\">“Sosyal medya platformlarının yaygınlaşmasıyla ilanların farklı mecralardan da yayımlanmasına müsaade etmeyeceğiz.”<\/blockquote>\n      <div style=\"margin-top:16px;color:#9fb0bf;font-size:14px;\">— Ticaret Bakanı Ömer Bolat<\/div>\n      <p style=\"margin:26px auto 0;max-width:60ch;color:#b9c6d3;font-size:14.5px;line-height:1.65;\">Bakanlığın gerekçesi: sahte ilanların, ilan kirliliğinin, spekülatif/fahiş fiyat artışlarının ve tüketici mağduriyetlerinin önlenmesi; yetki belgesiz ve kayıt dışı emlakçılık (“çantacı/ayakçı”) ile mücadele; kapora dolandırıcılığının engellenmesi.<\/p>\n    <\/div>\n  <\/section>\n\n  <!-- DURUM & UYARILAR (ACCORDIONS) -->\n  <section id=\"durum\" style=\"max-width:900px;margin:0 auto;padding:60px 24px;\">\n    <div style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#D6122B;\">7 Temmuz 2026<\/div>\n    <h2 style=\"font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:32px;color:#12293E;margin:10px 0 26px;letter-spacing:-.01em;\">Güncel durum, eşikler &amp; uyarılar<\/h2>\n\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <!-- durum -->\n      <div style=\"background:#fff;border:1px solid #E7E2D6;border-radius:14px;overflow:hidden;\">\n        <div onclick=\"{{ toggleOpen }}\" data-acc=\"durum\" style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 22px;cursor:pointer;\" style-hover=\"background:#FBFAF7;\">\n          <span style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:16px;color:#12293E;\">Güncel durum<\/span>\n          <sc-if value=\"{{ openDurum }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#8a7f6d;font-size:18px;\">−<\/span><\/sc-if>\n          <sc-if value=\"{{ openDurumOff }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#8a7f6d;font-size:18px;\">+<\/span><\/sc-if>\n        <\/div>\n        <sc-if value=\"{{ openDurum }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:0 22px 20px;font-size:14.5px;line-height:1.65;color:#44515d;\">\n          1 Şubat 2026 satılık taşınmaz zorunluluğu kesinleşti ve yürürlükte; ertelenmedi. Sosyal medya kısıtlaması hafifletilmedi; Bakanlık denetim ve yaptırımları (Haziran 2026 Meta cezası dahil) sürdürüyor. Doğan Demir'in soru önergesine Bakan Bolat henüz yazılı yanıt vermedi; beklenen resmi “uygulama kılavuzu” henüz yayımlanmadı.\n        <\/div>\n        <\/sc-if>\n      <\/div>\n      <!-- esik -->\n      <div style=\"background:#fff;border:1px solid #E7E2D6;border-radius:14px;overflow:hidden;\">\n        <div onclick=\"{{ toggleOpen }}\" data-acc=\"esik\" style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 22px;cursor:pointer;\" style-hover=\"background:#FBFAF7;\">\n          <span style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:16px;color:#12293E;\">Eşikler — kararı değiştirebilecek gelişmeler<\/span>\n          <sc-if value=\"{{ openEsik }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#8a7f6d;font-size:18px;\">−<\/span><\/sc-if>\n          <sc-if value=\"{{ openEsikOff }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#8a7f6d;font-size:18px;\">+<\/span><\/sc-if>\n        <\/div>\n        <sc-if value=\"{{ openEsik }}\" hint-placeholder-val=\"{{ false }}\">\n        <ul style=\"margin:0;padding:0 22px 20px 40px;font-size:14.5px;line-height:1.65;color:#44515d;\">\n          <li style=\"margin-bottom:8px;\">Bakanlık resmi bir “uygulama kılavuzu” yayımlar veya doğrulanmış ilanların sosyal medyada serbest paylaşımına açık izin verirse → strateji gevşetilebilir.<\/li>\n          <li style=\"margin-bottom:8px;\">Soru önergesine verilecek yanıt “bilgilendirme içeriği” ile “ilan” ayrımını netleştirirse → içerik politikası güncellenmeli.<\/li>\n          <li>Herhangi bir erteleme/iptal kararı çıkmadıkça mevcut katı uyum korunmalı; 2026 ortası itibarıyla böyle bir gevşetme yok.<\/li>\n        <\/ul>\n        <\/sc-if>\n      <\/div>\n      <!-- uyari -->\n      <div style=\"background:#fff;border:1px solid #E7E2D6;border-radius:14px;overflow:hidden;\">\n        <div onclick=\"{{ toggleOpen }}\" data-acc=\"uyari\" style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 22px;cursor:pointer;\" style-hover=\"background:#FBFAF7;\">\n          <span style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:16px;color:#12293E;\">Uyarılar &amp; çekinceler<\/span>\n          <sc-if value=\"{{ openUyari }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#8a7f6d;font-size:18px;\">−<\/span><\/sc-if>\n          <sc-if value=\"{{ openUyariOff }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#8a7f6d;font-size:18px;\">+<\/span><\/sc-if>\n        <\/div>\n        <sc-if value=\"{{ openUyari }}\" hint-placeholder-val=\"{{ false }}\">\n        <ul style=\"margin:0;padding:0 22px 20px 40px;font-size:14.5px;line-height:1.65;color:#44515d;\">\n          <li style=\"margin-bottom:8px;\">Bazı haberler bunu “tamamen yasak” diye sunar; hukuki gerçek daha nüanslıdır — yasak <strong>doğrulanmamış ilan paylaşımına<\/strong> yöneliktir, tüm sosyal medya kullanımına değil.<\/li>\n          <li style=\"margin-bottom:8px;\">286.206 ₺ üst sınırı 2026 içindir (25 Ara. 2025, 33118 sayılı RG; %25,49 yeniden değerleme). Rakam her yıl güncellenir; ilk duyuruda 158.460 ₺ idi.<\/li>\n          <li style=\"margin-bottom:8px;\">Yetki belgesi iptaline dair “yasal çalışma başlattık” ifadesi Aralık 2024'e aittir; doğrudan iptalin tam yürürlük durumu net değil — en somut risk idari para cezası ve hesap engelidir.<\/li>\n          <li>Bu rehber bilgilendirme amaçlıdır; bağlayıcı hukuki görüş değildir. Güncel mevzuat için Ticaret Bakanlığı ve resmî kaynaklar esas alınmalıdır.<\/li>\n        <\/ul>\n        <\/sc-if>\n      <\/div>\n      <!-- sektor -->\n      <div style=\"background:#fff;border:1px solid #E7E2D6;border-radius:14px;overflow:hidden;\">\n        <div onclick=\"{{ toggleOpen }}\" data-acc=\"detay1\" style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 22px;cursor:pointer;\" style-hover=\"background:#FBFAF7;\">\n          <span style=\"font-family:Arial,Helvetica,sans-serif;font-weight:700;font-size:16px;color:#12293E;\">Sektör tepkileri<\/span>\n          <sc-if value=\"{{ openDetay1 }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#8a7f6d;font-size:18px;\">−<\/span><\/sc-if>\n          <sc-if value=\"{{ openDetay1Off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#8a7f6d;font-size:18px;\">+<\/span><\/sc-if>\n        <\/div>\n        <sc-if value=\"{{ openDetay1 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:0 22px 20px;font-size:14.5px;line-height:1.65;color:#44515d;\">\n          <p style=\"margin:0 0 10px;\"><strong style=\"color:#12293E;\">Emlak Kulübü<\/strong> yetki belgeli danışmanların hesaplarının kapanmasından doğan mağduriyeti Bakan'a iletti; sosyal medya platformlarına da EİDS'ye uyumlu altyapı kurma süresi verilmesini önerdi.<\/p>\n          <p style=\"margin:0 0 10px;\"><strong style=\"color:#12293E;\">TEMFED<\/strong> düzenlemeyi genel olarak destekliyor; kayıt dışı emlakçılıkla mücadele açısından olumlu buluyor (~69 bin belgeli, ~20 bin belgesiz emlakçı).<\/p>\n          <p style=\"margin:0;\"><strong style=\"color:#12293E;\">TBMM:<\/strong> CHP milletvekilleri Doğan Demir (10 maddelik soru önergesi — “ilan” vs “bilgilendirme” kriteri) ve Aykut Kaya (araştırma önergesi — ~1.500 hesabın kapanması) girişimde bulundu.<\/p>\n        <\/div>\n        <\/sc-if>\n      <\/div>\n    <\/div>\n\n    <p style=\"margin:28px 0 0;font-size:12px;color:#9a9384;line-height:1.6;border-top:1px solid #E7E2D6;padding-top:18px;\">EİDS &amp; Sosyal Medya Uyum Rehberi · RE/MAX DOĞUŞ · Hazırlanma tarihi: 7 Temmuz 2026. Bilgilendirme amaçlıdır; bağlayıcı hukuki görüş değildir. Resmî kaynaklar: <a href=\"https://www.ticaret.gov.tr\" target=\"_blank\" rel=\"noopener\">Ticaret Bakanlığı<\/a> · <a href=\"https://www.resmigazete.gov.tr\" target=\"_blank\" rel=\"noopener\">Resmî Gazete<\/a> · <a href=\"https://www.turkiye.gov.tr\" target=\"_blank\" rel=\"noopener\">e-Devlet (EİDS Yetkilendirme)<\/a>.<\/p>\n  <\/section>\n\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:900},&quot;tumDetaylarAcik&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Davranış&quot;},&quot;aracOtomatikKaydir&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Davranış&quot;}}\">\nclass Component extends DCLogic {\n  state = { q1: null, q2: null, q3: null, open: {}, checks: {} };\n\n  componentDidMount() {\n    if (this.props.tumDetaylarAcik) {\n      this.setState({ open: { durum: true, esik: true, uyari: true, detay1: true } });\n    }\n  }\n\n  verdictReady = () => {\n    const { q1, q2, q3 } = this.state;\n    if (q1 === 'bolge') return true;\n    if (q1 === 'belirli' && q2 === 'yok') return true;\n    if (q1 === 'belirli' && q2 === 'var' && (q3 === 'link' || q3 === 'direkt')) return true;\n    return false;\n  };\n\n  answer = (e) => {\n    const q = e.currentTarget.dataset.q;\n    const val = e.currentTarget.dataset.val;\n    this.setState(s => {\n      const n = { ...s };\n      if (q === '1') { n.q1 = val; n.q2 = null; n.q3 = null; }\n      else if (q === '2') { n.q2 = val; n.q3 = null; }\n      else if (q === '3') { n.q3 = val; }\n      return n;\n    }, () => {\n      if (this.props.aracOtomatikKaydir && this.verdictReady()) {\n        const el = document.getElementById('arac-verdict');\n        if (el) { const y = el.getBoundingClientRect().top + window.scrollY - 90; window.scrollTo({ top: y, behavior: 'smooth' }); }\n      }\n    });\n  };\n\n  resetTool = () => this.setState({ q1: null, q2: null, q3: null });\n\n  navTo = (e) => {\n    const id = e.currentTarget.dataset.target;\n    const el = document.getElementById(id);\n    if (el) { const y = el.getBoundingClientRect().top + window.scrollY - 78; window.scrollTo({ top: y, behavior: 'smooth' }); }\n  };\n\n  toggleOpen = (e) => {\n    const id = e.currentTarget.dataset.acc;\n    this.setState(s => ({ open: { ...s.open, [id]: !s.open[id] } }));\n  };\n\n  toggleCheck = (e) => {\n    const id = e.currentTarget.dataset.chk;\n    this.setState(s => ({ checks: { ...s.checks, [id]: !s.checks[id] } }));\n  };\n\n  renderVals() {\n    const { q1, q2, q3, open, checks } = this.state;\n    const showQ2 = q1 === 'belirli';\n    const showQ3 = q1 === 'belirli' && q2 === 'var';\n\n    let tone = null;\n    if (q1 === 'bolge') tone = 'serbest';\n    else if (q1 === 'belirli' && q2 === 'yok') tone = 'yasakYetki';\n    else if (showQ3 && q3 === 'link') tone = 'izinli';\n    else if (showQ3 && q3 === 'direkt') tone = 'yasakDirekt';\n\n    const V = {\n      serbest: { bg: '#EAF4EE', border: '#BFE0CC', accent: '#147A4B', label: 'SERBEST', title: 'Bu içerik serbest — paylaşabilirsin.', body: 'Belirli bir taşınmazı fiyat/konumla “satılık/kiralık” olarak sunmadığın sürece bölge analizi, marka tanıtımı, eğitici ve bilgilendirici içerikler “ilan” sayılmaz. EİDS doğrulaması gerekmez.', icon: '✓' },\n      yasakYetki: { bg: '#FBEDEE', border: '#F0C4CA', accent: '#D6122B', label: 'YASAK', title: 'Yetkin olmadan paylaşamazsın.', body: 'Bu taşınmaz için önce e-Devlet üzerinden EİDS yetkisi almalısın (mal sahibi ofisinin 7 haneli yetki belgesi no’su ile yetki verir). Yetki olmadan yapılan her paylaşım aykırılıktır.', icon: '✕' },\n      izinli: { bg: '#EAF0F6', border: '#BFD3E6', accent: '#1F4E79', label: 'İZİNLİ', title: 'Doğrulanmış ilanın linkini paylaşabilirsin.', body: 'Portalda EİDS logolu doğrulanmış ilanı yayınla, sosyal medyada yalnızca o ilanın linkini paylaş (story link sticker / bio). İlan mahiyetli paylaşımda yetki belgesi no, işletme unvanı, il/ilçe/mahalle ve iletişimi eklemeyi unutma.', icon: '✓' },\n      yasakDirekt: { bg: '#FBEDEE', border: '#F0C4CA', accent: '#D6122B', label: 'YASAK', title: 'Doğrudan fiyatlı/konumlu ilan postu atma.', body: '“Satılık 3+1, X milyon ₺, DM’den ulaşın” tarzı doğrulaması olmayan post/Reels tam olarak ceza kaynağıdır. Bunun yerine portaldaki doğrulanmış ilanın LİNKİNİ paylaş.', icon: '✕' },\n    };\n    const vd = tone ? V[tone] : null;\n\n    return {\n      answer: this.answer, resetTool: this.resetTool, navTo: this.navTo,\n      toggleOpen: this.toggleOpen, toggleCheck: this.toggleCheck,\n      showQ2, showQ3,\n      selQ1belirli: q1 === 'belirli', selQ1bolge: q1 === 'bolge',\n      selQ2var: q2 === 'var', selQ2yok: q2 === 'yok',\n      selQ3link: q3 === 'link', selQ3direkt: q3 === 'direkt',\n      hasAnswer: q1 !== null,\n      showVerdict: !!vd,\n      vBg: vd ? vd.bg : '#ffffff', vBorder: vd ? vd.border : '#E7E2D6', vAccent: vd ? vd.accent : '#12293E',\n      vLabel: vd ? vd.label : '', vTitle: vd ? vd.title : '', vBody: vd ? vd.body : '', vIcon: vd ? vd.icon : '',\n      openDurum: !!open.durum, openDurumOff: !open.durum,\n      openEsik: !!open.esik, openEsikOff: !open.esik,\n      openUyari: !!open.uyari, openUyariOff: !open.uyari,\n      openDetay1: !!open.detay1, openDetay1Off: !open.detay1,\n      cBelge: !!checks.belge, cBelgeOff: !checks.belge,\n      cUnvan: !!checks.unvan, cUnvanOff: !checks.unvan,\n      cKonum: !!checks.konum, cKonumOff: !checks.konum,\n      cIletisim: !!checks.iletisim, cIletisimOff: !checks.iletisim,\n      cEnerji: !!checks.enerji, cEnerjiOff: !checks.enerji,\n      cLink: !!checks.link, cLinkOff: !checks.link,\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
