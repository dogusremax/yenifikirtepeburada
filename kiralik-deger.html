  :root{
    --blue:#0a2a5e;
    --blue-mid:#143d82;
    --red:#e2231a;
    --ink:#1a2230;
    --gray:#6b7280;
    --line:#e3e6ec;

    --soft:#f4f6f9;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DIN Neuzeit Grotesk','Archivo',sans-serif;
    background:var(--bg);
    color:var(--ink);

    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 24px}

  .back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--gray);font-size:.92rem;font-weight:500;margin-top:34px}
  .back:hover{color:var(--blue)}

  .head{text-align:center;margin-top:36px;margin-bottom:38px}
  .head .badge{display:inline-block;background:var(--blue);color:#fff;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:6px 14px;border-radius:30px;font-weight:500;margin-bottom:18px}

  .head p{color:var(--gray);font-weight:300;margin-top:12px;font-size:1.02rem}

  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:32px;box-shadow:0 18px 50px rgba(10,42,94,.07)}
  .group{margin-bottom:20px}
  .group:last-of-type{margin-bottom:0}
  label{display:block;font-size:.82rem;font-weight:600;color:var(--ink);margin-bottom:8px;letter-spacing:.01em}
  label .opt{color:var(--gray);font-weight:400;font-size:.78rem}
  input,select{
    width:100%;
    font-family:inherit;
    font-size:1rem;
    padding:13px 15px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--soft);
    color:var(--ink);
    transition:.18s;
  }
  input::placeholder{color:#9aa3b2}
  input:focus,select:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(10,42,94,.08)}
  .row{display:flex;gap:14px}
  .row .group{flex:1}

  .submit{
    width:100%;
    background:var(--blue);
    color:#fff;
    border:none;
    font-family:inherit;
    font-size:1.05rem;
    font-weight:600;
    padding:16px;
    border-radius:8px;
    cursor:pointer;
    margin-top:8px;
    transition:.18s;
  }
  .submit:hover{background:var(--blue-mid)}
  .note{text-align:center;font-size:.82rem;color:var(--gray);margin:18px 0 50px;font-weight:300}

  .success{display:none;text-align:center;padding:20px 0}
  .success .check{width:64px;height:64px;border-radius:50%;background:#e8f5ee;color:#1e9e5a;display:grid;place-items:center;font-size:1.8rem;margin:0 auto 18px}
  .success h2{color:var(--blue);font-size:1.5rem;margin-bottom:8px}
  .success p{color:var(--gray);font-weight:300}

  /* Mobil hamburger menü */
  .navbar{position:relative}
  .menu-toggle{display:none}
  @media(max-width:760px){
    .navbar{background:var(--blue);position:relative;z-index:20}
    .menu-toggle{display:block;position:absolute;top:14px;right:18px;
      width:44px;height:44px;border:none;background:transparent;cursor:pointer;z-index:40;padding:0}
    .menu-toggle span{display:block;width:26px;height:3px;background:#fff;margin:5px auto;transition:.3s;border-radius:2px}
    .menu-toggle.open span:nth-child(1){transform:translateY(8px) rotate(45deg)}
    .menu-toggle.open span:nth-child(2){opacity:0}
    .menu-toggle.open span:nth-child(3){transform:translateY(-8px) rotate(-45deg)}
    /* kapalı bar: sadece logo alanı + hamburger; linkler gizli */
    .navbar{min-height:64px}
    .topnav{flex-direction:column;align-items:stretch;gap:0;max-height:0;overflow:hidden;

<body>
  <div class="wrap">
    <a href="index.html" class="back">← Ana sayfa</a>

    <div class="head">
      <span class="badge">Kiralık Değerleme</span>
      <h1>Dairenizin kiralık değerini öğrenin</h1>
      <p>Bilgileri doldurun, uzman danışmanımız güncel piyasa değerleme raporunu sizle paylaşsın.</p>
    </div>

    <form class="card" id="formCard" name="kiralik-deger" action="https://formspree.io/f/mdajqbgo" method="POST" onsubmit="return submitForm(event)">
      <input type="hidden" name="form-name" value="kiralik-deger">
        <input type="hidden" name="_subject" value="Yeni Kiralık Değer Talebi">
      <p style="display:none"><label>Boş bırakın: <input name="bot-field"></label></p>
      <div class="group">
        <label>Daireniz hangi etapta?</label>
        <input type="text" name="etap" placeholder="Örn. 1. Etap">
      </div>

      <div class="row">
        <div class="group">
          <label>Daire No</label>
          <input type="text" name="daire_no" placeholder="Örn. 14">
        </div>
        <div class="group">
          <label>Kat</label>
          <input type="text" name="kat" placeholder="Örn. 5">
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label>Oda Sayısı</label>
          <select name="oda_sayisi">
            <option>1+1</option>
            <option selected>2+1</option>
            <option>3+1</option>
            <option>4+1</option>
            <option>5+1 ve üzeri</option>
          </select>
        </div>
        <div class="group">
          <label>Brüt m²</label>
          <input type="text" name="brut_m2" placeholder="Örn. 110">
        </div>
      </div>

      <div class="group">
        <label>Cephe / Manzara <span class="opt">(opsiyonel)</span></label>
        <input type="text" name="cephe" placeholder="Örn. Güney cephe, deniz manzaralı">
      </div>

      <div class="group">
        <label>Ad Soyad</label>
        <input type="text" name="ad_soyad" required placeholder="Adınız ve soyadınız">
      </div>

      <div class="group">
        <label>Telefon</label>
        <input type="tel" name="telefon" required placeholder="05XX XXX XX XX">
      </div>

      <button type="submit" class="submit">Kiralık Değer Talebi Gönder</button>
    </form>

    <div class="card success" id="successCard">
      <div class="check">✓</div>
      <h2>Talebiniz alındı</h2>
      <p>Uzman danışmanımız en kısa sürede sizinle iletişime geçecek.</p>
    </div>

    <p class="note">Bilgileriniz yalnızca değerleme amacıyla kullanılır.</p>
  </div>

<script>
  function submitForm(e){
    e.preventDefault();
    var form = e.target;
    var data = new FormData(form);
    fetch('https://formspree.io/f/mdajqbgo', {method:'POST', headers:{'Accept':'application/json'}, body:data})
      .then(function(){
        document.getElementById('formCard').style.display='none';
        document.getElementById('successCard').style.display='block';
        window.scrollTo({top:0,behavior:'smooth'});
      })
      .catch(function(){ alert('Bir hata oluştu, lütfen tekrar deneyin.'); });
    return false;
  }
</script>
